{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4">
                <h2 class="text-center mb-4">Verify OTP</h2>
                <p class="text-center">We've sent a code to <br><strong>{{ email }}</strong></p>
                <form method="POST">
                    <div class="mb-3">
                        <input type="text" name="otp" class="form-control text-center fs-3" maxlength="6"
                            placeholder="000000" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Verify</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
