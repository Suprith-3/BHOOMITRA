{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card p-4">
                <h2 class="mb-4"><i class="bi bi-bar-chart-line text-primary"></i> Yield Prediction</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Crop Type</label>
                        <select name="crop" class="form-select">
                            <option value="Rice">Rice</option>
                            <option value="Wheat">Wheat</option>
                            <option value="Sugarcane">Sugarcane</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Farm Size (Acres)</label>
                        <input type="number" step="0.1" name="size" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Soil Type</label>
                        <select name="soil" class="form-select">
                            <option value="Alluvial">Alluvial</option>
                            <option value="Black">Black</option>
                            <option value="Red">Red</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Predict Harvest</button>
                </form>

                {% if result %}
                <div class="mt-4 p-4 border rounded bg-light animate__animated animate__fadeIn">
                    <h4>Prediction Result</h4>
                    <div class="row text-center mt-3">
                        <div class="col-6">
                            <p class="text-muted mb-0">Expected Yield</p>
                            <h3 class="text-success">{{ result.predicted_yield }} Tons</h3>
                        </div>
                        <div class="col-6">
                            <p class="text-muted mb-0">Estimated Profit</p>
                            <h3 class="text-primary">₹{{ "{:,.2f}".format(result.predicted_profit) }}</h3>
                        </div>
                    </div>
                    <div class="mt-3">
                        <span
                            class="badge {% if result.risk_level == 'Low' %}bg-success{% elif result.risk_level == 'Medium' %}bg-warning text-dark{% else %}bg-danger{% endif %} fs-6">
                            Risk Level: {{ result.risk_level }}
                        </span>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
