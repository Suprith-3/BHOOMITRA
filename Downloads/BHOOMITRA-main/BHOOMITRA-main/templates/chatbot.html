{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow">
                <h2 class="text-center mb-4"><i class="bi bi-robot text-primary"></i> AI Farmer Assistant</h2>
                <div class="chat-box mb-4 p-3 bg-light rounded"
                    style="min-height: 300px; max-height: 500px; overflow-y: auto;">
                    {% if response %}
                    <div class="d-flex justify-content-start mb-3">
                        <div class="p-3 rounded bg-white shadow-sm border" style="max-width: 80%;">
                            {{ response | safe }}
                        </div>
                    </div>
                    {% else %}
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-chat-left-dots fs-1"></i>
                        <p>Ask me anything about farming, seeds, or weather.</p>
                    </div>
                    {% endif %}
                </div>

                <form method="POST">
                    <div class="row g-2">
                        <div class="col-md-3">
                            <select name="language" class="form-select">
                                <option value="English">English</option>
                                <option value="Kannada">Kannada</option>
                                <option value="Hindi">Hindi</option>
                            </select>
                        </div>
                        <div class="col-md-7">
                            <input type="text" name="query" class="form-control"
                                placeholder="Type your question here..." required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">Send</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
